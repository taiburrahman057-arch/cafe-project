<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arlo's — Kitchen Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── VARIABLES ── */
    :root {
      --bg:        #0A0C0A;
      --bg-panel:  #0F120F;
      --bg-card:   #141914;
      --bg-card2:  #1A201A;
      --border:    rgba(74, 222, 128, 0.12);
      --border-mid:rgba(74, 222, 128, 0.22);
      --green:     #4ADE80;
      --green-dim: #22C55E;
      --green-dark:#166534;
      --amber:     #F59E0B;
      --red:       #EF4444;
      --blue:      #60A5FA;
      --text:      #E2E8E2;
      --text-dim:  #6B7B6B;
      --text-mid:  #9CAD9C;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }

    /* ── SCANLINE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
    }

    /* ── LAYOUT ── */
    .shell { display: flex; min-height: 100vh; position: relative; z-index: 1; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 28px 24px 24px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo-main {
      font-family: var(--sans);
      font-size: 1.25rem; font-weight: 800;
      color: var(--green);
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .sidebar-logo-sub {
      font-size: 0.6rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--text-dim);
      margin-top: 4px;
    }
    .sidebar-logo-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 3px 8px;
      font-size: 0.55rem; letter-spacing: 0.2em;
      background: rgba(74,222,128,0.1);
      border: 1px solid var(--border-mid);
      color: var(--green);
      text-transform: uppercase;
    }

    .sidebar-nav { padding: 20px 0; flex: 1; }
    .nav-section-label {
      font-size: 0.52rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--text-dim);
      padding: 12px 24px 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 24px;
      font-size: 0.75rem; letter-spacing: 0.05em;
      color: var(--text-dim);
      cursor: pointer;
      transition: color 0.2s ease, background 0.2s ease;
      border-left: 2px solid transparent;
      position: relative;
    }
    .nav-item:hover { color: var(--text); background: rgba(74,222,128,0.04); }
    .nav-item.active {
      color: var(--green);
      border-left-color: var(--green);
      background: rgba(74,222,128,0.06);
    }
    .nav-item svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.8; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto;
      background: var(--green);
      color: var(--bg);
      font-size: 0.55rem; font-weight: 700;
      padding: 2px 6px;
      border-radius: 20px;
      min-width: 18px; text-align: center;
    }
    .nav-badge.amber { background: var(--amber); }
    .nav-badge.red { background: var(--red); }

    .sidebar-status {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }
    .status-dot-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.65rem; color: var(--text-dim);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }
    .status-time {
      font-size: 0.58rem; color: var(--text-dim);
      margin-top: 6px; letter-spacing: 0.08em;
    }

    /* ── MAIN ── */
    .main {
      margin-left: 220px;
      flex: 1; display: flex; flex-direction: column;
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 20px;
      background: var(--bg-panel);
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title {
      font-family: var(--sans);
      font-size: 1.1rem; font-weight: 700;
      color: var(--text); flex: 1;
    }
    .topbar-title span { color: var(--green); }
    .topbar-actions { display: flex; gap: 10px; align-items: center; }
    .btn-sm {
      padding: 7px 16px;
      font-family: var(--mono);
      font-size: 0.65rem; letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid var(--border-mid);
      background: transparent; color: var(--text-dim);
      cursor: pointer; transition: all 0.2s ease;
    }
    .btn-sm:hover { border-color: var(--green); color: var(--green); }
    .btn-sm.active-filter { border-color: var(--green); color: var(--green); background: rgba(74,222,128,0.08); }
    .topbar-clock {
      font-size: 0.65rem; color: var(--text-dim);
      letter-spacing: 0.1em; white-space: nowrap;
    }

    /* ── CONTENT ── */
    .content { padding: 28px 32px; flex: 1; }

    /* ── STATS ROW ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 20px 22px;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .stat-card.green::before  { background: var(--green); }
    .stat-card.amber::before  { background: var(--amber); }
    .stat-card.red::before    { background: var(--red); }
    .stat-card.blue::before   { background: var(--blue); }

    .stat-label {
      font-size: 0.58rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 10px;
    }
    .stat-value {
      font-family: var(--sans);
      font-size: 2rem; font-weight: 700;
      color: var(--text); line-height: 1;
    }
    .stat-value.green { color: var(--green); }
    .stat-value.amber { color: var(--amber); }
    .stat-value.red   { color: var(--red); }
    .stat-value.blue  { color: var(--blue); }
    .stat-sub {
      font-size: 0.6rem; color: var(--text-dim);
      margin-top: 8px; letter-spacing: 0.05em;
    }
    .stat-icon {
      position: absolute; right: 16px; top: 16px;
      opacity: 0.07; font-size: 2.5rem;
    }

    /* ── ORDERS TABLE AREA ── */
    .orders-header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 16px;
    }
    .orders-header h2 {
      font-family: var(--sans);
      font-size: 0.9rem; font-weight: 700;
      letter-spacing: 0.05em; color: var(--text);
      flex: 1;
    }
    .filter-tabs { display: flex; gap: 6px; }
    .filter-tab {
      padding: 5px 12px;
      font-family: var(--mono);
      font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
      border: 1px solid var(--border);
      background: transparent; color: var(--text-dim);
      cursor: pointer; transition: all 0.18s ease;
    }
    .filter-tab:hover { border-color: var(--border-mid); color: var(--text-mid); }
    .filter-tab.active { border-color: var(--green); color: var(--green); background: rgba(74,222,128,0.07); }

    .search-box {
      display: flex; align-items: center;
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 6px 12px; gap: 8px;
    }
    .search-box svg { width: 12px; height: 12px; stroke: var(--text-dim); fill: none; stroke-width: 2; flex-shrink: 0; }
    .search-box input {
      background: none; border: none; outline: none;
      font-family: var(--mono); font-size: 0.68rem;
      color: var(--text); width: 160px;
    }
    .search-box input::placeholder { color: var(--text-dim); }

    /* ── ORDERS LIST ── */
    .orders-list { display: flex; flex-direction: column; gap: 10px; }

    .order-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: border-color 0.2s ease;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity:0; transform: translateY(-8px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .order-card:hover { border-color: var(--border-mid); }
    .order-card.new-order { border-color: rgba(74,222,128,0.4); animation: newOrderPulse 0.5s ease, slideIn 0.3s ease; }
    @keyframes newOrderPulse {
      0%   { box-shadow: 0 0 0 0 rgba(74,222,128,0.5); }
      70%  { box-shadow: 0 0 0 12px rgba(74,222,128,0); }
      100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
    }

    .order-header {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
    }
    .order-id {
      font-size: 0.8rem; font-weight: 500;
      color: var(--green); letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .order-time {
      font-size: 0.62rem; color: var(--text-dim);
      letter-spacing: 0.05em; white-space: nowrap;
    }
    .order-items-preview {
      flex: 1; font-size: 0.68rem; color: var(--text-mid);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .order-total {
      font-family: var(--sans);
      font-size: 0.95rem; font-weight: 700;
      color: var(--text); white-space: nowrap;
    }
    .order-status-badge {
      padding: 4px 10px;
      font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase;
      border: 1px solid; font-weight: 500;
      white-space: nowrap; flex-shrink: 0;
    }
    .badge-new      { color: var(--green); border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.08); }
    .badge-prep     { color: var(--amber); border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.08); }
    .badge-ready    { color: var(--blue);  border-color: rgba(96,165,250,0.4); background: rgba(96,165,250,0.08); }
    .badge-done     { color: var(--text-dim); border-color: var(--border); background: transparent; }
    .badge-cancelled{ color: var(--red);  border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.06); }

    .order-chevron {
      width: 14px; height: 14px; flex-shrink: 0;
      stroke: var(--text-dim); fill: none; stroke-width: 2;
      transition: transform 0.25s ease;
    }
    .order-card.expanded .order-chevron { transform: rotate(180deg); }

    /* Order detail expand */
    .order-detail {
      display: none;
      border-top: 1px solid var(--border);
      background: var(--bg-card2);
      padding: 18px 20px;
    }
    .order-card.expanded .order-detail { display: block; }

    .order-detail-grid { display: grid; grid-template-columns: 1fr 260px; gap: 20px; }

    /* Items table */
    .items-table { width: 100%; border-collapse: collapse; }
    .items-table th {
      font-size: 0.55rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--text-dim);
      text-align: left; padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .items-table th:last-child { text-align: right; }
    .items-table td {
      font-size: 0.72rem; color: var(--text);
      padding: 8px 0; border-bottom: 1px solid rgba(74,222,128,0.05);
    }
    .items-table td:last-child { text-align: right; color: var(--green); }
    .items-table td.qty { color: var(--text-dim); }
    .items-table td.unit { color: var(--text-dim); font-size: 0.65rem; }

    /* Bill summary */
    .bill-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 16px 18px;
    }
    .bill-title {
      font-size: 0.55rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 12px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .bill-row {
      display: flex; justify-content: space-between;
      font-size: 0.7rem; padding: 4px 0;
      color: var(--text-mid);
    }
    .bill-row.subtotal { color: var(--text); }
    .bill-row.gst { color: var(--text-dim); }
    .bill-row.total {
      font-family: var(--sans); font-weight: 700;
      font-size: 1rem; color: var(--green);
      margin-top: 8px; padding-top: 10px;
      border-top: 1px solid var(--border-mid);
    }
    .bill-gst-note {
      font-size: 0.58rem; color: var(--text-dim);
      font-style: italic; margin-top: 4px;
      padding: 4px 0;
    }

    /* Status controls */
    .status-controls {
      margin-top: 16px; padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .status-controls-label {
      font-size: 0.55rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--text-dim);
      margin-bottom: 10px;
    }
    .status-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .status-btn {
      padding: 7px 14px;
      font-family: var(--mono);
      font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;
      border: 1px solid var(--border);
      background: transparent; color: var(--text-dim);
      cursor: pointer; transition: all 0.18s ease;
    }
    .status-btn:hover { border-color: var(--border-mid); color: var(--text); }
    .status-btn.s-new:hover    { border-color: var(--green); color: var(--green); background: rgba(74,222,128,0.06); }
    .status-btn.s-prep:hover   { border-color: var(--amber); color: var(--amber); background: rgba(245,158,11,0.06); }
    .status-btn.s-ready:hover  { border-color: var(--blue);  color: var(--blue);  background: rgba(96,165,250,0.06); }
    .status-btn.s-done:hover   { border-color: var(--text-dim); color: var(--text-mid); }
    .status-btn.s-cancel:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.06); }
    .status-btn.current        { opacity: 0.4; cursor: default; pointer-events: none; }

    .order-meta {
      font-size: 0.62rem; color: var(--text-dim);
      margin-top: 14px; padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex; gap: 20px; flex-wrap: wrap;
    }
    .order-meta span { display: flex; align-items: center; gap: 5px; }

    /* ── NOTIFICATION BELL ── */
    .notif-bell {
      position: relative;
      width: 36px; height: 36px;
      border: 1px solid var(--border-mid);
      background: transparent; color: var(--text-mid);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
    }
    .notif-bell:hover { border-color: var(--green); color: var(--green); }
    .notif-bell svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; }
    .notif-bell .n-dot {
      position: absolute; top: 6px; right: 6px;
      width: 7px; height: 7px;
      background: var(--green); border-radius: 50%;
      box-shadow: 0 0 6px var(--green);
      display: none;
    }
    .notif-bell.has-new .n-dot { display: block; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center; padding: 80px 20px;
      border: 1px dashed var(--border);
      background: var(--bg-card);
    }
    .empty-state-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }
    .empty-state p { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.08em; }

    /* ── TOAST ── */
    .admin-toast {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      background: var(--bg-card2);
      border: 1px solid var(--green);
      border-left: 3px solid var(--green);
      padding: 14px 18px; max-width: 320px;
      font-size: 0.72rem; color: var(--text);
      transform: translateY(20px); opacity: 0; pointer-events: none;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .admin-toast.show { transform: translateY(0); opacity: 1; }
    .admin-toast strong { color: var(--green); display: block; margin-bottom: 3px; }

    /* ── REVENUE MINI CHART ── */
    .mini-chart { display: flex; align-items: flex-end; gap: 4px; height: 36px; margin-top: 10px; }
    .mini-bar {
      flex: 1; background: rgba(74,222,128,0.25);
      border-top: 1px solid var(--green);
      transition: height 0.4s ease;
    }

    /* ── NEW ORDER INDICATOR ── */
    .new-indicator {
      display: inline-block;
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      margin-right: 4px;
      animation: pulse 1.5s infinite;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .order-detail-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .sidebar {
        width: 100%; height: auto;
        position: static; flex-direction: row;
        border-right: none; border-bottom: 1px solid var(--border);
        overflow-x: auto;
      }
      .sidebar-logo { padding: 14px 18px; border-bottom: none; border-right: 1px solid var(--border); flex-shrink: 0; }
      .sidebar-logo-badge { display: none; }
      .sidebar-nav { display: flex; flex-direction: row; padding: 0; white-space: nowrap; flex: 1; overflow-x: auto; }
      .nav-section-label { display: none; }
      .nav-item { padding: 14px 16px; border-left: none; border-bottom: 2px solid transparent; }
      .nav-item.active { border-bottom-color: var(--green); border-left-color: transparent; }
      .sidebar-status { display: none; }
      .shell { flex-direction: column; }
      .main { margin-left: 0; }
      .topbar { padding: 14px 18px; }
      .content { padding: 16px 18px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .filter-tabs { flex-wrap: wrap; }
      .search-box input { width: 100px; }
      .order-header { flex-wrap: wrap; gap: 8px; }
      .order-items-preview { display: none; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .stat-value { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-main">Arlo's</div>
      <div class="sidebar-logo-sub">Restocafe</div>
      <div class="sidebar-logo-badge">Admin</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Operations</div>
      <div class="nav-item active" onclick="showSection('orders')">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>
        Live Orders
        <span class="nav-badge" id="nav-new-count">0</span>
      </div>
      <div class="nav-item" onclick="showSection('history')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        History
      </div>
      <div class="nav-section-label">Metrics</div>
      <div class="nav-item" onclick="showSection('revenue')">
        <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Revenue
      </div>
      <div class="nav-item" onclick="showSection('menu')">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Top Items
      </div>
    </nav>
    <div class="sidebar-status">
      <div class="status-dot-row">
        <div class="status-dot"></div>
        <span>System Online</span>
      </div>
      <div class="status-time" id="sidebar-time">--:--:--</div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-title">Live Orders <span id="topbar-subtitle">— All</span></div>
      <div class="topbar-actions">
        <div class="search-box">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search order..." />
        </div>
        <button class="notif-bell" id="notif-bell" title="Notifications">
          <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <div class="n-dot"></div>
        </button>
        <button class="btn-sm" onclick="addMockOrder()">+ Mock Order</button>
        <button class="btn-sm" onclick="clearDone()">Clear Done</button>
      </div>
      <div class="topbar-clock" id="topbar-clock">--:--:--</div>
    </div>

    <!-- CONTENT -->
    <div class="content">

      <!-- STATS -->
      <div class="stats-grid">
        <div class="stat-card green">
          <div class="stat-label">New Orders</div>
          <div class="stat-value green" id="stat-new">0</div>
          <div class="stat-sub">Awaiting kitchen</div>
          <div class="stat-icon">🆕</div>
        </div>
        <div class="stat-card amber">
          <div class="stat-label">In Preparation</div>
          <div class="stat-value amber" id="stat-prep">0</div>
          <div class="stat-sub">Being cooked now</div>
          <div class="stat-icon">🍳</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-label">Ready to Serve</div>
          <div class="stat-value blue" id="stat-ready">0</div>
          <div class="stat-sub">Waiting pickup</div>
          <div class="stat-icon">✅</div>
        </div>
        <div class="stat-card red">
          <div class="stat-label">Today's Revenue</div>
          <div class="stat-value" id="stat-revenue" style="color:var(--text)">₹0</div>
          <div class="stat-sub">Completed orders</div>
          <div class="stat-icon">💰</div>
        </div>
      </div>

      <!-- FILTER TABS -->
      <div class="orders-header">
        <h2 id="section-title">📋 Live Orders</h2>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
          <button class="filter-tab" onclick="setFilter('NEW', this)">New</button>
          <button class="filter-tab" onclick="setFilter('PREP', this)">Preparing</button>
          <button class="filter-tab" onclick="setFilter('READY', this)">Ready</button>
          <button class="filter-tab" onclick="setFilter('DONE', this)">Done</button>
          <button class="filter-tab" onclick="setFilter('CANCELLED', this)">Cancelled</button>
        </div>
      </div>

      <!-- ORDERS LIST -->
      <div class="orders-list" id="orders-list"></div>

    </div>
  </div>
</div>

<!-- ADMIN TOAST -->
<div class="admin-toast" id="admin-toast">
  <strong id="toast-title"></strong>
  <span id="toast-body"></span>
</div>

<script>
/* ==========================================
   ARLO'S ADMIN — CORE LOGIC
   ========================================== */

// ── STATE ──
let orders = [];
let currentFilter = 'all';
let orderCounter = 1000;
let totalRevenue = 0;
let toastTimer;

// ── SAMPLE MENU (mirrors real cart items) ──
const SAMPLE_ITEMS = [
  { name: 'Chicken Hakka Noodles',    price: 170 },
  { name: 'Egg Biryani',              price: 170 },
  { name: 'Chicken Lollipop',         price: 220 },
  { name: 'Oreo Choco Shake',         price: 180 },
  { name: 'Chicken Schezwan Noodles', price: 200 },
  { name: 'Veg Fried Rice',           price: 130 },
  { name: 'Chicken Roll',             price: 130 },
  { name: 'Paneer Roll',              price: 140 },
  { name: 'Chicken Alfredo Pasta',    price: 230 },
  { name: 'Veg Thukpa',              price: 150 },
  { name: 'Crispy Roll',             price: 200 },
  { name: "Arlo's Special Fried Rice", price: 200 },
  { name: 'Chicken Cheese Roll',      price: 180 },
  { name: 'Veg Schezwan',            price: 150 },
  { name: 'American Chop Suey',       price: 230 },
];

const GST_RATE = 0; // sync with cart.js

// ── BACKEND CONNECTION ──────────────────────────────────────
const BACKEND = 'https://cafe-project-1-dyym.onrender.com';
async function fetchOrders() {
  try {
    const res  = await fetch(`${BACKEND}/orders`);
    const data = await res.json();
  

    const incoming    = data.orders;
    const existingIds = new Set(orders.map(o => String(o.id)));
    const newArrivals = incoming.filter(o => !existingIds.has(String(o.id)));;

    newArrivals.forEach(o => {
     orders.unshift({ ...o, id: String(o.id), expanded: false });
      showToast('🔔 New Order!', `${o.id} · ₹${o.total}`);
    });

    incoming.forEach(serverOrder => {
      const local = orders.find(o => o.id === serverOrder.id);
      if (local) {
        local.status = serverOrder.status;
        local.subtotal = serverOrder.subtotal;
        local.gst = serverOrder.gst;
        local.total = serverOrder.total;
        local.items = serverOrder.items;
      }
    });

    totalRevenue = orders
      .filter(o => o.status === 'DONE')
      .reduce((s, o) => s + o.total, 0);
    render();
  } catch (err) {
    console.warn('Could not reach backend — is server.js running?');
  }
}

async function pushStatusToBackend(orderId, newStatus) {
  try {
    await fetch(`${BACKEND}/order/${orderId}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    });
  } catch (err) {
    console.error('Could not push status update:', err);
  }
}

function initDemoOrders() { /* replaced by fetchOrders() */ }
function ago(mins) { return new Date(Date.now() - mins * 60000); }
// ── RENDER ──
function render() {
  updateStats();
  renderOrders();
}

function updateStats() {
  const newC   = orders.filter(o => o.status === 'NEW').length;
  const prepC  = orders.filter(o => o.status === 'PREP').length;
  const readyC = orders.filter(o => o.status === 'READY').length;

  document.getElementById('stat-new').textContent   = newC;
  document.getElementById('stat-prep').textContent  = prepC;
  document.getElementById('stat-ready').textContent = readyC;
  document.getElementById('stat-revenue').textContent = '₹' + totalRevenue;
  document.getElementById('nav-new-count').textContent = newC;
  document.getElementById('notif-bell').classList.toggle('has-new', newC > 0);
}

function renderOrders() {
  const list = document.getElementById('orders-list');
  const search = document.getElementById('search-input').value.toLowerCase();

  let filtered = orders.slice().reverse(); // newest first

  if (currentFilter !== 'all') {
    filtered = filtered.filter(o => o.status === currentFilter);
  }

  if (search) {
    filtered = filtered.filter(o =>
      o.id.toLowerCase().includes(search) ||
      o.items.some(i => i.name.toLowerCase().includes(search))
    );
  }

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🍽️</div>
        <p>No orders found</p>
      </div>
    `;
    return;
  }

  list.innerHTML = filtered.map(order => orderCardHTML(order)).join('');

  // Attach event listeners
  list.querySelectorAll('.order-header').forEach(h => {
    h.addEventListener('click', () => toggleExpand(h.dataset.id));
  });
  list.querySelectorAll('.status-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      updateStatus(btn.dataset.id, btn.dataset.status);
    });
  });
}

function orderCardHTML(order) {
  const statusClass = {
    NEW: 'badge-new', PREP: 'badge-prep', READY: 'badge-ready',
    DONE: 'badge-done', CANCELLED: 'badge-cancelled'
  }[order.status] || 'badge-new';

  const statusLabel = {
    NEW: 'New', PREP: 'Preparing', READY: 'Ready',
    DONE: 'Done', CANCELLED: 'Cancelled'
  }[order.status] || order.status;

  const itemsPreview = order.items.map(i => `${i.qty}× ${i.name}`).join(' · ');
  const timeStr = formatTime(order.time);
  const agoStr  = timeAgo(order.time);

  const itemRows = order.items.map(i => `
    <tr>
      <td>${i.name}</td>
      <td class="qty">${i.qty}</td>
      <td class="unit">₹${i.price}</td>
      <td>₹${i.price * i.qty}</td>
    </tr>
  `).join('');

  const statuses = ['NEW','PREP','READY','DONE','CANCELLED'];
  const statusBtns = statuses.map(s => `
    <button class="status-btn s-${s.toLowerCase()} ${order.status === s ? 'current' : ''}"
      data-id="${order.id}" data-status="${s}">
      ${s === 'NEW' ? '🆕 New' : s === 'PREP' ? '🍳 Prep' : s === 'READY' ? '✅ Ready' : s === 'DONE' ? '✓ Done' : '✕ Cancel'}
    </button>
  `).join('');

  const isNew = order.status === 'NEW';

  return `
    <div class="order-card ${order.expanded ? 'expanded' : ''} ${isNew ? 'new-order' : ''}" id="card-${order.id}">
      <div class="order-header" data-id="${order.id}">
        ${isNew ? '<span class="new-indicator"></span>' : ''}
        <div class="order-id">${order.id}</div>
        <div class="order-time">${timeStr} · ${agoStr}</div>
        <div class="order-items-preview">${itemsPreview}</div>
        <div class="order-total">₹${order.total}</div>
        <div class="order-status-badge ${statusClass}">${statusLabel}</div>
        <svg class="order-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="order-detail">
        <div class="order-detail-grid">
          <div>
            <table class="items-table">
              <thead>
                <tr>
                  <th>Item</th>
                  <th>Qty</th>
                  <th>Unit Price</th>
                  <th>Amount</th>
                </tr>
              </thead>
              <tbody>${itemRows}</tbody>
            </table>
            <div class="order-meta">
              <span>🕐 Placed at ${timeStr}</span>
              <span>📋 ${order.items.length} item type${order.items.length > 1 ? 's' : ''}</span>
              <span>🧾 Order ID: ${order.id}</span>
            </div>
          </div>
          <div>
            <div class="bill-box">
              <div class="bill-title">Bill Summary</div>
              ${order.items.map(i => `
                <div class="bill-row">
                  <span>${i.name} ×${i.qty}</span>
                  <span>₹${i.price * i.qty}</span>
                </div>
              `).join('')}
              <div class="bill-row subtotal" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">
                <span>Subtotal</span><span>₹${order.subtotal}</span>
              </div>
              <div class="bill-row gst">
                <span>GST</span>
                <span>${order.gst === 0 ? 'Nil' : '₹' + order.gst}</span>
              </div>
              ${order.gst === 0 ? `<div class="bill-gst-note">No GST charged currently</div>` : ''}
              <div class="bill-row total">
                <span>Total</span><span>₹${order.total}</span>
              </div>
            </div>
            <div class="status-controls">
              <div class="status-controls-label">Update Status</div>
              <div class="status-btns">${statusBtns}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ── TOGGLE EXPAND ──
function toggleExpand(id) {
  const order = orders.find(o => o.id === id);
  if (order) order.expanded = !order.expanded;
  renderOrders();
}

// ── UPDATE STATUS ──

function updateStatus(id, newStatus) {
  const order = orders.find(o => o.id === id);
  if (!order) return;
  const old = order.status;
  order.status = newStatus;
  order.expanded = true;
  if (newStatus === 'DONE' && old !== 'DONE') totalRevenue += order.total;
  if (old === 'DONE' && newStatus !== 'DONE') totalRevenue -= order.total;
  
  pushStatusToBackend(id, newStatus); // ← ADD THIS LINE
  
  showToast('Status Updated', `${order.id} → ${newStatus}`);
  render();
}

// ── FILTER ──
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  const labels = {
    all: 'All', NEW: 'New Orders', PREP: 'In Preparation',
    READY: 'Ready to Serve', DONE: 'Completed', CANCELLED: 'Cancelled'
  };
  document.getElementById('topbar-subtitle').textContent = '— ' + (labels[f] || f);
  renderOrders();
}

// ── MOCK ORDER ──
function addMockOrder() {
  orderCounter++;
  const id = 'ARO-' + orderCounter;

  // Pick 1–3 random items
  const count = Math.ceil(Math.random() * 3);
  const shuffled = [...SAMPLE_ITEMS].sort(() => Math.random() - 0.5).slice(0, count);
  const items = shuffled.map(s => ({
    name: s.name,
    qty: Math.ceil(Math.random() * 2),
    price: s.price
  }));

  const sub = items.reduce((s, i) => s + i.price * i.qty, 0);
  const gst = Math.round(sub * GST_RATE);

  orders.push({
    id, time: new Date(), status: 'NEW',
    items, subtotal: sub, gst, total: sub + gst,
    expanded: false
  });

  // Flash notification
  showToast('🔔 New Order!', `${id} · ₹${sub + gst}`);

  // Auto reset filter to show it
  if (currentFilter !== 'all' && currentFilter !== 'NEW') {
    currentFilter = 'all';
    document.querySelectorAll('.filter-tab').forEach((t,i) => t.classList.toggle('active', i === 0));
    document.getElementById('topbar-subtitle').textContent = '— All';
  }

  render();
}

// ── CLEAR DONE ──
function clearDone() {
  orders = orders.filter(o => o.status !== 'DONE' && o.status !== 'CANCELLED');
  showToast('Cleared', 'Done & cancelled orders removed');
  render();
}

// ── SECTIONS (sidebar nav) ──
function showSection(section) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.currentTarget.classList.add('active');

  const titles = {
    orders:  '📋 Live Orders',
    history: '🕐 Order History',
    revenue: '📈 Revenue Dashboard',
    menu:    '⭐ Top Menu Items'
  };
  document.getElementById('section-title').textContent = titles[section] || '📋 Live Orders';

  if (section === 'revenue' || section === 'menu' || section === 'history') {
    showToast('Coming Soon', 'Connect the cart system first to populate this section.');
  }
}

// ── TOAST ──
function showToast(title, body) {
  const toast = document.getElementById('admin-toast');
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-body').textContent  = body;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  const str = now.toLocaleTimeString('en-IN', { hour12: false });
  document.getElementById('topbar-clock').textContent = str;
  const sidebarTime = document.getElementById('sidebar-time');
  if (sidebarTime) sidebarTime.textContent = now.toLocaleString('en-IN', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

// ── HELPERS ──
function formatTime(d) {
  return new Date(d).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
}
function timeAgo(d) {
  const mins = Math.floor((Date.now() - new Date(d)) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  return `${Math.floor(mins/60)}h ago`;
}

// ── SEARCH ──
document.getElementById('search-input').addEventListener('input', renderOrders);

// ── BOOT ──
// NEW:
initDemoOrders(); // no-op now
fetchOrders();    // load real orders from backend immediately
setInterval(fetchOrders, 5000); // poll every 5 seconds for new orders
setInterval(updateClock, 1000);
setInterval(() => renderOrders(), 60000);
updateClock();
</script>
<script src="script.js"></script>
</body>
</html>
